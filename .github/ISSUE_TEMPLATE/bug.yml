name: Bug 报告
description: 报告一个问题或错误
title: "[Bug] "
labels: ["bug"]
assignees: []

body:
  - type: dropdown
    id: platform
    attributes:
      label: 平台
      description: 此问题出现在哪个平台？
      options:
        - 桌面端
        - 移动端
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 如何触发这个 bug
      placeholder: |
        1. 打开...
        2. 点击...
        3. 出现错误
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你期望发生什么

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: 操作系统、版本号等
      placeholder: |
        - OS: Windows 11 / macOS 14 / Android 14
        - 版本: v1.0.0
